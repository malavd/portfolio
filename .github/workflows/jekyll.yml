name: Build and Deploy Jekyll Blog

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: ./blog
      
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
      
      - name: Build with Jekyll
        run: |
          cd blog
          bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}/blog"
        env:
          JEKYLL_ENV: production
      
      - name: Copy blog build to main site
        run: |
          mkdir -p _site
          cp -r blog/_site _site/blog
          cp index.html _site/
          cp -r assets _site/ || true
          cp -r images _site/ || true
          cp style.css _site/
          cp script.js _site/
          cp thank-you.html _site/
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
